<!doctype html>
<html lang="en">
<head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--bg-primary);background-image:var(--bg-wash);background-attachment:fixed;font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .card{box-sizing:border-box;padding:24px;display:flex;flex-direction:column;gap:14px;}
  h3{margin:0;font-size:14px;font-weight:700;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .row{display:flex;align-items:flex-end;gap:10px;}
  .stack{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--accent-tint-12);border:1px solid var(--accent-tint-15);border-radius:6px;width:28px;}
  .tok{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
  .val{font-size:10px;color:var(--text-secondary);}
</style></head>
<body><div class="card">
  <div>
    <div class="eyebrow">Foundations</div>
    <h3>Spacing · em scale</h3>
  </div>
  <div class="row">
    <div class="stack"><div class="bar" style="height:4px;"></div><div class="tok">1</div><div class="val">.25em</div></div>
    <div class="stack"><div class="bar" style="height:8px;"></div><div class="tok">2</div><div class="val">.5em</div></div>
    <div class="stack"><div class="bar" style="height:12px;"></div><div class="tok">3</div><div class="val">.75em</div></div>
    <div class="stack"><div class="bar" style="height:16px;"></div><div class="tok">4</div><div class="val">1em</div></div>
    <div class="stack"><div class="bar" style="height:20px;"></div><div class="tok">5</div><div class="val">1.25em</div></div>
    <div class="stack"><div class="bar" style="height:24px;"></div><div class="tok">6</div><div class="val">1.5em</div></div>
    <div class="stack"><div class="bar" style="height:32px;"></div><div class="tok">8</div><div class="val">2em</div></div>
    <div class="stack"><div class="bar" style="height:40px;"></div><div class="tok">10</div><div class="val">2.5em</div></div>
    <div class="stack"><div class="bar" style="height:48px;"></div><div class="tok">12</div><div class="val">3em</div></div>
    <div class="stack"><div class="bar" style="height:64px;"></div><div class="tok">16</div><div class="val">4em</div></div>
    <div class="stack"><div class="bar" style="height:80px;"></div><div class="tok">20</div><div class="val">5em</div></div>
  </div>
</div></body></html>
