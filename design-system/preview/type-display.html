<!doctype html>
<html lang="en">
<head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--bg-primary);background-image:var(--bg-wash);background-attachment:fixed;font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .card{box-sizing:border-box;padding:24px;display:flex;flex-direction:column;gap:8px;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:4px;}
  .spec{display:grid;grid-template-columns:1fr 140px;gap:16px;align-items:baseline;padding:6px 0;border-bottom:1px dashed rgba(0,0,0,0.06);}
  .spec:last-child{border-bottom:none;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:right;white-space:nowrap;}
</style></head>
<body><div class="card">
  <div class="eyebrow">Type · Display</div>
  <div class="spec"><span style="font-size:48px;font-weight:800;letter-spacing:-0.03em;line-height:1.1;">個人開発の<span style="background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;">すゝめ</span></span><span class="meta">Hero · clamp(2.5,7vw,4.5em)<br/>800 · -0.03em</span></div>
  <div class="spec"><span style="font-size:40px;font-weight:800;letter-spacing:-0.03em;">成果物置き場</span><span class="meta">H1 · 3.052em · 800</span></div>
  <div class="spec"><span style="font-size:32px;font-weight:700;letter-spacing:-0.02em;">開発記録の日記</span><span class="meta">H2 · 2.441em · 700</span></div>
</div></body></html>
