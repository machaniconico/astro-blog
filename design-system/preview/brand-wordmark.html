<!doctype html>
<html lang="en">
<head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--bg-primary);background-image:var(--bg-wash);background-attachment:fixed;font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .card{box-sizing:border-box;padding:24px;display:flex;flex-direction:column;gap:14px;}
  h3{margin:0;font-size:14px;font-weight:700;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .logo-row{display:flex;gap:20px;align-items:center;}
  .lock{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:12px;min-width:160px;}
  .wordmark{font-family:var(--font-sans);font-size:28px;font-weight:700;letter-spacing:-0.02em;color:#0f172a;}
  .wordmark-accent{font-size:28px;font-weight:800;letter-spacing:-0.03em;}
  .accent-word{background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
  .favicon{width:48px;height:48px;}
</style></head>
<body><div class="card">
  <div>
    <div class="eyebrow">Brand</div>
    <h3>Wordmark &amp; favicon</h3>
  </div>
  <div class="logo-row">
    <div class="lock">
      <div class="wordmark" style="display:flex;align-items:center;gap:0.55em;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <g transform="translate(-1 -4)">
            <path d="M4 20 L14 10 L18 14 L8 24 Z"/>
            <path d="M14 10 L18 14"/>
            <path d="M2 21 L4 19 L8 23 Z" fill="#2563eb" stroke="none"/>
          </g>
        </svg>
        個人開発のすゝめ
      </div>
      <div class="meta">header lockup · 700</div>
    </div>
    <div class="lock">
      <div class="wordmark-accent">個人開発の<span class="accent-word">すゝめ</span></div>
      <div class="meta">hero · 800 · gradient</div>
    </div>
    <div class="lock">
      <img class="favicon" src="../assets/favicon.svg" alt="favicon"/>
      <div class="meta">favicon.svg</div>
    </div>
  </div>
</div></body></html>
