<!doctype html>
<html lang="en">
<head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--bg-primary);background-image:var(--bg-wash);background-attachment:fixed;font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .card{box-sizing:border-box;padding:24px;display:flex;flex-direction:column;gap:14px;}
  h3{margin:0;font-size:14px;font-weight:700;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .nav-card{padding:18px;background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:16px;display:flex;flex-direction:column;gap:10px;}
  .nav-card.hover{border-color:rgba(37,99,235,0.4);box-shadow:0 12px 40px rgba(0,0,0,0.1),0 0 0 1px rgba(37,99,235,0.1);transform:translateY(-3px);}
  .icon-chip{display:flex;align-items:center;justify-content:center;width:44px;height:44px;background:rgba(37,99,235,0.07);border:1px solid rgba(37,99,235,0.15);border-radius:12px;color:#2563eb;}
  .title{font-size:15px;font-weight:700;color:#0f172a;margin:0;}
  .desc{font-size:12px;color:#475569;line-height:1.6;margin:0;}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .tag{font-size:10px;padding:3px 8px;background:rgba(37,99,235,0.06);border:1px solid rgba(37,99,235,0.12);border-radius:20px;color:#94a3b8;}
  .label{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;}
</style></head>
<body><div class="card">
  <div>
    <div class="eyebrow">Components</div>
    <h3>Nav card · rest vs hover</h3>
  </div>
  <div class="grid">
    <div>
      <div class="nav-card">
        <div class="icon-chip"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg></div>
        <h4 class="title">成果物置き場</h4>
        <p class="desc">これまで作ったWebアプリ・ツールを一覧で紹介。</p>
        <div class="tags"><span class="tag">Web App</span><span class="tag">CLI Tool</span><span class="tag">OSS</span></div>
      </div>
      <div class="label" style="margin-top:8px;">rest</div>
    </div>
    <div>
      <div class="nav-card hover">
        <div class="icon-chip"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg></div>
        <h4 class="title">開発記録の日記</h4>
        <p class="desc">技術メモ、学習記録、開発日誌。</p>
        <div class="tags"><span class="tag">技術メモ</span><span class="tag">学習記録</span></div>
      </div>
      <div class="label" style="margin-top:8px;">hover · lift · accent ring</div>
    </div>
  </div>
</div></body></html>
