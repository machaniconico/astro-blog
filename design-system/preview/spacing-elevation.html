<!doctype html>
<html lang="en">
<head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--bg-primary);background-image:var(--bg-wash);background-attachment:fixed;font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .card{box-sizing:border-box;padding:32px 24px;display:flex;flex-direction:column;gap:28px;}
  h3{margin:0;font-size:14px;font-weight:700;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:end;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{background:var(--bg-card);border-radius:12px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
  .name{font-size:12px;color:var(--text-secondary);font-weight:600;}
  .sm {box-shadow:0 2px 6px rgba(0,0,0,0.06);}
  .md {box-shadow:0 8px 30px rgba(0,0,0,0.10);}
  .lg {box-shadow:0 12px 40px rgba(0,0,0,0.10);}
</style></head>
<body><div class="card">
  <div>
    <div class="eyebrow">Foundations</div>
    <h3>Elevation &amp; glow</h3>
  </div>
  <div class="grid">
    <div class="cell"><div class="box sm" style="width:90px;height:60px;"></div><div class="name">shadow-sm</div><div class="meta">rest</div></div>
    <div class="cell"><div class="box md" style="width:90px;height:60px;"></div><div class="name">shadow-md</div><div class="meta">diary hover</div></div>
    <div class="cell"><div class="box lg" style="width:90px;height:60px;"></div><div class="name">shadow-lg</div><div class="meta">nav / work hover</div></div>
    <div class="cell"><div class="box" style="width:90px;height:60px;background:#2563eb;box-shadow:0 0 20px rgba(37,99,235,0.25);border-radius:8px;"></div><div class="name">glow-primary</div><div class="meta">btn rest</div></div>
    <div class="cell"><div class="box" style="width:90px;height:60px;background:#1d4ed8;box-shadow:0 0 28px rgba(37,99,235,0.35);border-radius:8px;"></div><div class="name">glow-primary-hover</div><div class="meta">btn hover</div></div>
    <div class="cell"><div class="box" style="width:90px;height:60px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,0.06),0 8px 24px rgba(0,0,0,0.05),0 16px 32px rgba(0,0,0,0.04);"></div><div class="name">shadow-stack</div><div class="meta">hero image</div></div>
  </div>
</div></body></html>
