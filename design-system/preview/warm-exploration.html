<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<title>Warm accent — exploration</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin:0; padding:0; background:#eef0f3; font-family: var(--font-sans); }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const CANDIDATES = [
  {
    id: "amber500",
    label: "A · Amber 500 (#f59e0b)",
    color: "#f59e0b",
    hover: "#d97706",
    tint06: "rgba(245,158,11,0.08)",
    tint15: "rgba(245,158,11,0.22)",
    glow:   "rgba(245,158,11,0.28)",
    notes: "定番。青との補色関係が強く、視線誘導が効く。やや黄寄り。",
  },
  {
    id: "orange500",
    label: "B · Orange 500 (#f97316)",
    color: "#f97316",
    hover: "#ea580c",
    tint06: "rgba(249,115,22,0.08)",
    tint15: "rgba(249,115,22,0.20)",
    glow:   "rgba(249,115,22,0.28)",
    notes: "暖かく鮮やか。editorial 誌面の差し色に近い温度感。",
  },
  {
    id: "amber600",
    label: "C · Amber 600 (#d97706)",
    color: "#d97706",
    hover: "#b45309",
    tint06: "rgba(217,119,6,0.08)",
    tint15: "rgba(217,119,6,0.22)",
    glow:   "rgba(217,119,6,0.25)",
    notes: "深く落ち着いた琥珀。#2563eb との明度コントラストが一番穏やか。",
  },
];

// ------ Shared pieces ------

const Swatches = ({ c }) => (
  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
    <Swatch bg={c.color} name="warm" hex={c.color.toUpperCase()} role="Primary warm" glow={c.glow} />
    <Swatch bg={c.hover} name="warm-dark" hex={c.hover.toUpperCase()} role="Hover" />
    <Swatch bg={c.tint06} name="warm-tint-06" hex="8% tint" role="Badge fill" bordered />
    <Swatch bg={c.tint15} name="warm-tint-15" hex="~20%" role="Badge border" bordered />
  </div>
);
const Swatch = ({ bg, name, hex, role, glow, bordered }) => (
  <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
    <div style={{
      height: 54, borderRadius: 10,
      background: bg,
      border: bordered ? "1px solid var(--border-color)" : "1px solid rgba(0,0,0,0.05)",
      boxShadow: glow ? `0 0 16px ${glow}` : "none",
    }} />
    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--text-primary)" }}>{name}</div>
    <div style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "var(--text-muted)" }}>{hex}</div>
    <div style={{ fontSize: 10.5, color: "var(--text-secondary)" }}>{role}</div>
  </div>
);

// Works card, re-skinned with the candidate warm color on Live Demo + "新着" badge
const WorksCard = ({ c }) => {
  const [hover, setHover] = React.useState(false);
  const [btnH, setBtnH] = React.useState(false);
  return (
    <article
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: "var(--bg-card)",
        border: `1px solid ${hover ? "rgba(37,99,235,0.4)" : "var(--border-color)"}`,
        borderRadius: 16, padding: "1.4em", display: "flex", flexDirection: "column",
        transition: "all 0.25s ease",
        transform: hover ? "translateY(-3px)" : "none",
        boxShadow: hover ? "0 12px 40px rgba(0,0,0,0.1)" : "none",
        fontSize: 14,
      }}
    >
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.9em" }}>
        {/* Icon chip stays blue — accent color unchanged */}
        <div style={{ width: 38, height: 38, borderRadius: 10, background: "var(--accent-tint-07)", border: "1px solid var(--accent-tint-15)", display:"grid", placeItems:"center", color:"var(--accent)"}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </div>
        {/* NEW badge — warm */}
        <span style={{
          fontSize: "0.7em", fontWeight: 700, letterSpacing: "0.12em",
          textTransform: "uppercase",
          padding: "0.35em 0.7em", borderRadius: 20,
          background: c.tint06, color: c.hover,
          border: `1px solid ${c.tint15}`,
        }}>新着</span>
      </div>
      <h2 style={{ fontSize: "1.08em", fontWeight: 700, margin: "0 0 0.5em", color: "var(--text-primary)", lineHeight: 1.3 }}>
        家計簿 CLI
      </h2>
      <p style={{ fontSize: "0.82em", color: "var(--text-secondary)", lineHeight: 1.65, margin: "0 0 1em", flex: 1 }}>
        日々の支出をターミナルから 3 秒で記録する CLI。SQLite 保存、月次サマリ出力。
      </p>
      <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4em", marginBottom: "1em" }}>
        {["Rust", "SQLite", "CLI Tool"].map((t) => (
          <span key={t} style={{
            fontSize: "0.7em", padding: "0.25em 0.65em", borderRadius: 20,
            background: "var(--accent-tint-06)", color: "var(--accent)",
            border: "1px solid var(--accent-tint-15)", fontWeight: 600,
          }}>{t}</span>
        ))}
      </div>
      <div style={{ display: "flex", gap: "0.6em", flexWrap: "wrap" }}>
        {/* Live Demo — warm fill */}
        <a href="#" onClick={(e)=>e.preventDefault()}
           onMouseEnter={() => setBtnH(true)} onMouseLeave={() => setBtnH(false)}
           style={{
             display: "inline-flex", alignItems: "center", gap: "0.4em",
             padding: "0.45em 1em", borderRadius: 8,
             fontSize: "0.78em", fontWeight: 600, textDecoration: "none",
             color: "#fff",
             background: btnH ? c.hover : c.color,
             boxShadow: btnH ? `0 0 22px ${c.glow}` : `0 0 14px ${c.glow}`,
             transition: "all 0.2s ease",
           }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Live Demo
        </a>
        <a href="#" onClick={(e)=>e.preventDefault()}
           style={{
             display: "inline-flex", alignItems: "center", gap: "0.4em",
             padding: "0.45em 1em", borderRadius: 8,
             fontSize: "0.78em", fontWeight: 600, textDecoration: "none",
             background: "transparent", color: "var(--text-secondary)",
             border: "1px solid var(--border-color)",
           }}>
          GitHub
        </a>
      </div>
    </article>
  );
};

// Diary "今日" row — uses warm as a gentle highlight dot + label
const DiaryRow = ({ c }) => (
  <div style={{ display:"flex", flexDirection:"column", gap: 10 }}>
    {[
      { today: true,  date: "2026.04.25", title: "庭のバラが咲いた。" },
      { today: false, date: "2026.04.23", title: "Rust で CLI を書き直している話。" },
      { today: false, date: "2026.04.21", title: "朝のコーヒー、豆を変えた。" },
    ].map((e, i) => (
      <div key={i} style={{
        display:"flex", alignItems:"center", gap: 14,
        padding: "12px 14px",
        border: "1px solid var(--border-color)", borderRadius: 12,
        background: "var(--bg-card)",
      }}>
        <span style={{
          width: 7, height: 7, borderRadius: "50%",
          background: e.today ? c.color : "transparent",
          boxShadow: e.today ? `0 0 10px ${c.glow}` : "none",
          border: e.today ? "none" : "1px solid var(--border-color)",
          flexShrink: 0,
        }} />
        <span style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--text-muted)", minWidth: 80 }}>{e.date}</span>
        {e.today && (
          <span style={{
            fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase",
            padding: "2px 7px", borderRadius: 4,
            background: c.tint06, color: c.hover,
            border: `1px solid ${c.tint15}`,
          }}>Today</span>
        )}
        <span style={{ fontSize: 14, color: "var(--text-primary)", flex: 1, fontWeight: e.today ? 600 : 400 }}>
          {e.title}
        </span>
      </div>
    ))}
  </div>
);

// Coexistence: blue + warm in same frame
const Coexist = ({ c }) => (
  <div style={{ display:"flex", flexDirection:"column", gap: 12 }}>
    <div style={{ display:"flex", gap: 10, flexWrap: "wrap" }}>
      <button style={{
        padding: "0.55em 1.3em", borderRadius: 8, border: "none",
        background: "var(--accent)", color: "#fff", fontWeight: 600, fontSize: 13,
        fontFamily: "inherit", boxShadow: "0 0 20px rgba(37,99,235,0.25)", cursor:"pointer",
      }}>記事を読む</button>
      <button style={{
        padding: "0.55em 1.3em", borderRadius: 8, border: "none",
        background: c.color, color: "#fff", fontWeight: 600, fontSize: 13,
        fontFamily: "inherit", boxShadow: `0 0 20px ${c.glow}`, cursor:"pointer",
      }}>Live Demo</button>
      <button style={{
        padding: "0.55em 1.3em", borderRadius: 8, background: "transparent",
        color: "var(--text-secondary)", fontWeight: 600, fontSize: 13,
        fontFamily: "inherit", border: "1px solid var(--border-color)", cursor:"pointer",
      }}>GitHub</button>
    </div>
    <p style={{ margin: 0, fontSize: 13, color: "var(--text-secondary)", lineHeight: 1.7 }}>
      <span style={{ color: "var(--accent)", fontWeight: 600 }}>青</span> は継続的な導線
      (リンク、読む、見る)、<span style={{ color: c.hover, fontWeight: 600 }}>暖色</span> は
      「今・新しい・外に出る」ための差し色。
    </p>
  </div>
);

const SectionTitle = ({ children }) => (
  <div style={{ fontSize: 10, letterSpacing: "0.18em", textTransform: "uppercase",
                color: "var(--text-muted)", fontWeight: 600, marginBottom: 10 }}>
    {children}
  </div>
);

const CandidateArtboard = ({ c }) => (
  <div style={{ padding: "22px 26px", display:"flex", flexDirection:"column", gap: 22, fontFamily: "var(--font-sans)" }}>
    <div>
      <div style={{ fontSize: 10, letterSpacing: "0.2em", textTransform: "uppercase",
                    color: c.hover, fontWeight: 700 }}>Candidate</div>
      <h2 style={{ margin: "4px 0 4px", fontSize: 20, fontWeight: 800, letterSpacing: "-0.02em" }}>
        {c.label}
      </h2>
      <p style={{ margin: 0, fontSize: 12.5, color: "var(--text-secondary)", lineHeight: 1.6 }}>{c.notes}</p>
    </div>

    <div>
      <SectionTitle>Swatches</SectionTitle>
      <Swatches c={c} />
    </div>

    <div>
      <SectionTitle>Works card · Live Demo + 新着バッジ</SectionTitle>
      <WorksCard c={c} />
    </div>

    <div>
      <SectionTitle>Diary list · "Today" highlight</SectionTitle>
      <DiaryRow c={c} />
    </div>

    <div>
      <SectionTitle>Coexistence with blue</SectionTitle>
      <Coexist c={c} />
    </div>
  </div>
);

// ---------------- Mount ----------------

const App = () => (
  <DesignCanvas title="暖色追加の検討 — 3案比較" subtitle="#2563eb と共存させる差し色を選ぶ">
    <DCSection id="candidates" title="Warm accent candidates">
      {CANDIDATES.map((c) => (
        <DCArtboard key={c.id} id={c.id} label={c.label} width={520} height={920}>
          <CandidateArtboard c={c} />
        </DCArtboard>
      ))}
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
