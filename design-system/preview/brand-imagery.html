<!doctype html>
<html lang="en">
<head><meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html,body{margin:0;padding:0;background:var(--bg-primary);background-image:var(--bg-wash);background-attachment:fixed;font-family:var(--font-sans);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  .card{box-sizing:border-box;padding:24px;display:flex;flex-direction:column;gap:14px;}
  h3{margin:0;font-size:14px;font-weight:700;}
  .eyebrow{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);font-weight:600;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  img{width:100%;height:70px;object-fit:cover;border-radius:12px;border:1px solid var(--border-color);display:block;}
  .name{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:4px;}
</style></head>
<body><div class="card">
  <div>
    <div class="eyebrow">Brand · Editorial imagery</div>
    <h3>Blog placeholders</h3>
  </div>
  <div class="grid">
    <div><img src="../assets/blog-placeholder-1.jpg" alt=""/><div class="name">placeholder-1</div></div>
    <div><img src="../assets/blog-placeholder-2.jpg" alt=""/><div class="name">placeholder-2</div></div>
    <div><img src="../assets/blog-placeholder-3.jpg" alt=""/><div class="name">placeholder-3</div></div>
    <div><img src="../assets/blog-placeholder-4.jpg" alt=""/><div class="name">placeholder-4</div></div>
    <div><img src="../assets/blog-placeholder-5.jpg" alt=""/><div class="name">placeholder-5</div></div>
  </div>
</div></body></html>
